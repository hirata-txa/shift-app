<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#4a6fa5">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>シフト表</title>
<style>
  :root {
    --primary: #4a6fa5;
    --primary-light: #e8eef6;
    --bg: #f5f6f8;
    --card: #ffffff;
    --border: #dee2e6;
    --text: #212529;
    --text-muted: #868e96;
    --danger: #e03131;
    --success: #2f9e44;
    --cell-h: 44px;
    --slot-on: #4a6fa5;
    --slot-off: #f0f0f0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.4;
    overscroll-behavior: none;
  }

  /* ===== Login Screen ===== */
  .login-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; padding: 20px;
  }
  .login-screen h1 { font-size: 1.5rem; color: var(--primary); margin-bottom: 8px; }
  .login-screen p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 24px; }
  .login-screen input {
    width: 200px; padding: 12px; font-size: 1.2rem; text-align: center;
    border: 2px solid var(--border); border-radius: 10px; letter-spacing: 8px; margin-bottom: 16px;
  }
  .login-screen input:focus { border-color: var(--primary); outline: none; }
  .login-screen .btn-primary {
    width: 200px; padding: 12px; background: var(--primary); color: #fff;
    border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; margin-bottom: 8px;
  }
  .login-screen .btn-secondary {
    background: none; border: none; color: var(--text-muted);
    font-size: 0.85rem; cursor: pointer; text-decoration: underline;
  }
  .login-error { color: var(--danger); font-size: 0.85rem; margin-top: 8px; }

  /* ===== Header ===== */
  header {
    background: var(--primary); color: #fff; padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 1.1rem; font-weight: 600; }
  .header-buttons { display: flex; gap: 6px; }
  header button {
    background: rgba(255,255,255,0.2); border: none; color: #fff;
    font-size: 0.8rem; padding: 6px 10px; border-radius: 6px; cursor: pointer;
  }

  /* ===== Week Nav ===== */
  .week-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px; background: var(--card); border-bottom: 1px solid var(--border);
  }
  .week-nav button {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 14px; font-size: 0.9rem; cursor: pointer; color: var(--text);
  }
  .week-nav input[type="date"] {
    border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px;
    font-size: 0.9rem; font-family: inherit; color: var(--text);
  }

  /* ===== Week Table ===== */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 0 0 80px; }
  table { width: 100%; min-width: 600px; border-collapse: collapse; background: var(--card); }
  th, td {
    border: 1px solid var(--border); text-align: center;
    font-size: 0.82rem; height: var(--cell-h); min-width: 70px;
  }
  th {
    background: var(--primary-light); color: var(--primary); font-weight: 600;
    position: sticky; top: 0; z-index: 10; padding: 6px 4px;
  }
  th.name-col {
    position: sticky; left: 0; z-index: 20;
    background: var(--primary); color: #fff; min-width: 80px;
  }
  td.name-cell {
    position: sticky; left: 0; z-index: 5;
    background: #f0f4f8; font-weight: 600; font-size: 0.85rem; white-space: nowrap;
  }
  .sun { color: var(--danger); }
  .sat { color: var(--primary); }
  th.today { background: #fff3bf; color: #e67700; }
  th.day-header { cursor: pointer; }
  th.day-header:active { background: var(--primary); color: #fff; }

  /* ===== Week Cell (summary) ===== */
  td.shift-summary {
    padding: 4px; cursor: pointer; font-size: 0.75rem; color: var(--text-muted);
  }
  td.shift-summary.has-shift { background: var(--primary-light); color: var(--primary); font-weight: 600; }

  /* ===== Day Detail View ===== */
  .day-view { display: none; }
  .day-view.active { display: block; }
  .day-header-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; background: var(--card); border-bottom: 1px solid var(--border);
  }
  .day-header-bar button {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 14px; font-size: 0.9rem; cursor: pointer; color: var(--text);
  }
  .day-header-bar .back-btn { font-size: 0.8rem; padding: 6px 10px; }
  .day-header-bar span { font-size: 0.95rem; font-weight: 600; }
  .day-nav { display: flex; gap: 4px; }
  .day-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 0 0 80px; }
  .day-table { width: 100%; border-collapse: collapse; background: var(--card); }
  .day-table th, .day-table td {
    border: 1px solid var(--border); text-align: center; font-size: 0.78rem;
    padding: 0; height: 36px; min-width: 52px;
  }
  .day-table th {
    background: var(--primary-light); color: var(--primary);
    font-weight: 600; position: sticky; top: 0; z-index: 10;
  }
  .day-table th.time-col {
    position: sticky; left: 0; z-index: 20;
    background: var(--primary); color: #fff; min-width: 56px; font-size: 0.72rem;
  }
  .day-table td.time-cell {
    position: sticky; left: 0; z-index: 5;
    background: #f0f4f8; font-weight: 500; font-size: 0.72rem; white-space: nowrap;
  }
  .day-table td.slot {
    cursor: pointer; transition: background 0.1s; user-select: none;
  }
  .day-table td.slot.on { background: var(--slot-on); }
  .day-table td.slot.off { background: var(--slot-off); }
  .day-table td.slot:active { opacity: 0.7; }

  /* ===== Panels ===== */
  .app-screen { display: none; }
  .overlay-panel {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    z-index: 200; justify-content: center; align-items: flex-end;
  }
  .overlay-panel.open { display: flex; }
  .bottom-sheet {
    background: var(--card); width: 100%; max-height: 70vh;
    border-radius: 16px 16px 0 0; padding: 20px 16px; overflow-y: auto;
  }
  .bottom-sheet h2 {
    font-size: 1rem; margin-bottom: 12px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .bottom-sheet h2 button {
    background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--text-muted);
  }
  .member-list { list-style: none; }
  .member-list li {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .member-list li input {
    flex: 1; border: 1px solid var(--border); border-radius: 6px; padding: 8px; font-size: 0.9rem;
  }
  .member-list li button {
    background: none; border: none; color: var(--danger);
    font-size: 0.85rem; margin-left: 8px; cursor: pointer; padding: 8px;
  }
  .add-member {
    margin-top: 12px; width: 100%; padding: 10px; background: var(--primary);
    color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer;
  }

  .sync-status {
    position: fixed; bottom: 12px; right: 12px; background: var(--success); color: #fff;
    padding: 6px 12px; border-radius: 20px; font-size: 0.75rem;
    opacity: 0; transition: opacity 0.3s; z-index: 300;
  }
  .sync-status.show { opacity: 1; }

  .feedback-btn {
    position: fixed; bottom: 16px; left: 16px; background: var(--primary); color: #fff;
    border: none; padding: 8px 14px; border-radius: 20px; font-size: 0.8rem;
    cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2); z-index: 300;
  }
  .feedback-sheet textarea {
    width: 100%; height: 120px; border: 1px solid var(--border); border-radius: 8px;
    padding: 10px; font-size: 0.9rem; resize: none; font-family: inherit;
  }
  .feedback-sheet textarea:focus { border-color: var(--primary); outline: none; }
  .feedback-send {
    margin-top: 10px; width: 100%; padding: 10px; background: var(--primary);
    color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer;
  }
  .feedback-sent { text-align: center; color: var(--success); font-size: 0.9rem; margin-top: 8px; display: none; }
</style>
</head>
<body>

<!-- Login -->
<div class="login-screen" id="loginScreen">
  <h1>シフト表</h1>
  <p>合言葉を入力してください</p>
  <input type="text" id="passcodeInput" maxlength="20" placeholder="合言葉" enterkeyhint="go">
  <button class="btn-primary" onclick="doLogin()">入る</button>
  <button class="btn-secondary" onclick="doCreate()">新しいグループを作る</button>
  <div class="login-error" id="loginError"></div>
</div>

<!-- App -->
<div class="app-screen" id="appScreen">
  <header>
    <h1 id="appTitle">シフト表</h1>
    <div class="header-buttons">
      <button onclick="openMemberPanel()">メンバー</button>
      <button onclick="doLogout()">退出</button>
    </div>
  </header>

  <!-- Week View -->
  <div id="weekView">
    <div class="week-nav">
      <button onclick="jumpToday()">今日</button>
      <input type="date" id="weekStartDate" onchange="jumpToDate(this.value)">
      <button onclick="openDayView()">日別</button>
    </div>
    <div class="table-wrap">
      <table id="shiftTable"></table>
    </div>
  </div>

  <!-- Day Detail View -->
  <div class="day-view" id="dayView">
    <div class="day-header-bar">
      <button class="back-btn" onclick="closeDayView()">&lt; 週</button>
      <div class="day-nav">
        <button onclick="changeDayPage(-1)">&lt;</button>
        <span id="dayLabel"></span>
        <button onclick="changeDayPage(1)">&gt;</button>
      </div>
      <button class="back-btn" onclick="goToday()">今日</button>
    </div>
    <div class="day-table-wrap">
      <table class="day-table" id="dayTable"></table>
    </div>
  </div>
</div>

<!-- Member Panel -->
<div class="overlay-panel" id="memberPanel" onclick="if(event.target===this)closeMemberPanel()">
  <div class="bottom-sheet">
    <h2>メンバー管理 <button onclick="closeMemberPanel()">×</button></h2>
    <ul class="member-list" id="memberList"></ul>
    <button class="add-member" onclick="addMember()">+ メンバーを追加</button>
  </div>
</div>

<!-- Feedback -->
<button class="feedback-btn" id="feedbackBtn" onclick="openFeedback()">&#x1F4DD; 改善希望</button>
<div class="overlay-panel" id="feedbackPanel" onclick="if(event.target===this)closeFeedback()">
  <div class="bottom-sheet feedback-sheet">
    <h2>改善希望・ご意見 <button onclick="closeFeedback()">×</button></h2>
    <textarea id="feedbackText" placeholder="気づいたこと、改善してほしいことを書いてください"></textarea>
    <button class="feedback-send" onclick="sendFeedback()">送信</button>
    <div class="feedback-sent" id="feedbackSent">送信しました！</div>
  </div>
</div>

<div class="sync-status" id="syncStatus">保存しました</div>

<script>
// ===== Supabase =====
const SUPABASE_URL = 'https://fatvcblikyqkfjifuxkh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_HUl7YjaWLIud2K_QeH6rPg_3NQu4lxV';

function sbFetch(table, method, params) {
  const url = new URL(`${SUPABASE_URL}/rest/v1/${table}`);
  const opts = {
    method: method || 'GET',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'resolution=merge-duplicates,return=representation' : 'return=representation'
    }
  };
  if (params?.query) Object.entries(params.query).forEach(([k, v]) => url.searchParams.set(k, v));
  if (params?.body) opts.body = JSON.stringify(params.body);
  return fetch(url, opts).then(r => r.json());
}

// ===== Time Slots =====
const SLOTS = [];
for (let h = 9; h <= 18; h++) {
  SLOTS.push(String(h).padStart(2,'0') + ':00');
  if (h < 19) SLOTS.push(String(h).padStart(2,'0') + ':30');
}
// 9:00, 9:30, 10:00, ..., 18:30 = 20 slots

// ===== State =====
let passcode = localStorage.getItem('shift-passcode') || '';
let members = [];
let shifts = {}; // key: "date_mi" → value: "09:00,09:30,10:00,..."
let weekStartDate = null; // Monday of current view
let currentDayDate = null; // null = week view, "YYYY-MM-DD" = day view start date
const DAY_PAGE_SIZE = 4;
const WEEK_DISPLAY_WEEKS = 52; // 1 year

// ===== Login =====
function showLogin() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginError').textContent = '';
}
function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
}

async function doLogin() {
  const code = document.getElementById('passcodeInput').value.trim();
  if (!code) return;
  passcode = code;
  const data = await sbFetch('members', 'GET', { query: { passcode: `eq.${passcode}`, order: 'sort_order' } });
  if (!data || data.length === 0) {
    document.getElementById('loginError').textContent = 'この合言葉のグループは見つかりません';
    return;
  }
  members = data;
  localStorage.setItem('shift-passcode', passcode);
  showApp();
  await loadShifts();
  renderWeek();
}

async function doCreate() {
  const code = document.getElementById('passcodeInput').value.trim();
  if (!code) { document.getElementById('loginError').textContent = '合言葉を入力してください'; return; }
  const existing = await sbFetch('members', 'GET', { query: { passcode: `eq.${code}`, limit: '1' } });
  if (existing && existing.length > 0) {
    document.getElementById('loginError').textContent = 'この合言葉は既に使われています'; return;
  }
  passcode = code;
  const defaults = ['メンバー1', 'メンバー2', 'メンバー3'];
  members = await sbFetch('members', 'POST', { body: defaults.map((name, i) => ({ name, sort_order: i, passcode })) });
  localStorage.setItem('shift-passcode', passcode);
  showApp();
  renderWeek();
}

function doLogout() {
  localStorage.removeItem('shift-passcode');
  passcode = ''; members = []; shifts = {};
  showLogin();
}

// ===== Data =====
async function loadShifts() {
  const data = await sbFetch('shifts', 'GET', { query: { passcode: `eq.${passcode}` } });
  shifts = {};
  if (data && Array.isArray(data)) {
    data.forEach(row => { shifts[row.date + '_' + row.member_index] = row.shift_text; });
  }
}

async function saveShift(date, mi, slotStr) {
  if (slotStr) {
    await sbFetch('shifts', 'POST', {
      body: { date, member_index: mi, shift_text: slotStr, passcode },
      query: { on_conflict: 'date,member_index,passcode' }
    });
  } else {
    await sbFetch('shifts', 'DELETE', {
      query: { date: `eq.${date}`, member_index: `eq.${mi}`, passcode: `eq.${passcode}` }
    });
  }
  showSyncStatus();
}

function showSyncStatus() {
  const el = document.getElementById('syncStatus');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

// ===== Date Helpers =====
function fmt(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmtShort(d) { return (d.getMonth()+1) + '/' + d.getDate(); }
const DAY_NAMES = ['月','火','水','木','金','土','日'];
function isToday(d) {
  const t = new Date();
  return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
}
function parseDate(str) {
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function dayOfWeekName(d) {
  const idx = (d.getDay() + 6) % 7; // Mon=0
  return DAY_NAMES[idx];
}

// ===== Slot Helpers =====
function slotsToSummary(slotStr) {
  if (!slotStr) return '';
  const arr = slotStr.split(',').filter(Boolean).sort();
  if (arr.length === 0) return '';
  return arr[0] + '-' + addMinutes(arr[arr.length - 1], 30);
}

function addMinutes(timeStr, min) {
  const [h, m] = timeStr.split(':').map(Number);
  const total = h * 60 + m + min;
  return String(Math.floor(total / 60)).padStart(2, '0') + ':' + String(total % 60).padStart(2, '0');
}

// ===== Week View =====
function getThisMonday() {
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const monday = new Date(d.getFullYear(), d.getMonth(), diff);
  monday.setHours(0,0,0,0);
  return monday;
}

function initWeekStart() {
  if (!weekStartDate) weekStartDate = getThisMonday();
}

function jumpToday() {
  weekStartDate = getThisMonday();
  document.getElementById('weekStartDate').value = fmt(weekStartDate);
  renderWeek();
  scrollToToday();
}

function jumpToDate(dateStr) {
  if (!dateStr) return;
  const d = parseDate(dateStr);
  // Find Monday of that week
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  weekStartDate = new Date(d.getFullYear(), d.getMonth(), diff);
  renderWeek();
  scrollToToday();
}

function scrollToToday() {
  setTimeout(() => {
    const todayTh = document.querySelector('th.today');
    if (todayTh) todayTh.scrollIntoView({ inline: 'start', behavior: 'smooth' });
  }, 100);
}

function renderWeek() {
  currentDayDate = null;
  document.getElementById('weekView').style.display = '';
  document.getElementById('dayView').classList.remove('active');
  initWeekStart();

  document.getElementById('weekStartDate').value = fmt(weekStartDate);

  // Generate all days for WEEK_DISPLAY_WEEKS weeks
  const allDays = [];
  const start = new Date(weekStartDate);
  for (let i = 0; i < WEEK_DISPLAY_WEEKS * 7; i++) {
    const d = new Date(start);
    d.setDate(d.getDate() + i);
    allDays.push(d);
  }

  const table = document.getElementById('shiftTable');
  let html = '<thead><tr><th class="name-col">名前</th>';
  allDays.forEach(d => {
    const dowIdx = (d.getDay() + 6) % 7;
    let cls = 'day-header';
    if (dowIdx === 5) cls += ' sat';
    if (dowIdx === 6) cls += ' sun';
    if (isToday(d)) cls += ' today';
    const monthLabel = d.getDate() === 1 || allDays.indexOf(d) === 0
      ? `<span style="font-size:0.65rem;color:var(--text-muted)">${d.getMonth()+1}月</span><br>` : '';
    html += `<th class="${cls}" onclick="openDayView('${fmt(d)}')" style="min-width:48px;padding:4px 2px;font-size:0.72rem;">` +
      `${monthLabel}${d.getDate()}<br>${DAY_NAMES[dowIdx]}</th>`;
  });
  html += '</tr></thead><tbody>';

  members.forEach((m, mi) => {
    html += `<tr><td class="name-cell">${esc(m.name)}</td>`;
    allDays.forEach(d => {
      const key = fmt(d) + '_' + mi;
      const val = shifts[key] || '';
      const summary = slotsToSummary(val);
      const cls = summary ? 'shift-summary has-shift' : 'shift-summary';
      html += `<td class="${cls}" onclick="openDayView('${fmt(d)}')" style="min-width:48px;font-size:0.7rem;">${esc(summary)}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody>';
  table.innerHTML = html;

  scrollToToday();
}

// ===== Day Detail View =====
function openDayView(dateStr) {
  currentDayDate = dateStr || fmt(new Date());
  document.getElementById('weekView').style.display = 'none';
  document.getElementById('dayView').classList.add('active');
  renderDayTable();
}

function closeDayView() {
  document.getElementById('dayView').classList.remove('active');
  document.getElementById('weekView').style.display = '';
  currentDayDate = null;
  renderWeek();
}

function changeDayPage(dir) {
  const d = parseDate(currentDayDate);
  d.setDate(d.getDate() + dir * DAY_PAGE_SIZE);
  currentDayDate = fmt(d);
  renderDayTable();
}

function goToday() {
  currentDayDate = fmt(new Date());
  renderDayTable();
}

function renderDayTable() {
  // Build array of dates for this page
  const startDate = parseDate(currentDayDate);
  const pageDays = [];
  for (let i = 0; i < DAY_PAGE_SIZE; i++) {
    const d = new Date(startDate);
    d.setDate(d.getDate() + i);
    pageDays.push(d);
  }

  // Update label
  const last = pageDays[pageDays.length - 1];
  document.getElementById('dayLabel').textContent =
    `${fmtShort(startDate)} 〜 ${fmtShort(last)}`;

  const table = document.getElementById('dayTable');

  // Header row 1: dates spanning across slots
  let html = '<thead>';
  // Date header row
  html += '<tr><th class="time-col" rowspan="2">名前</th>';
  pageDays.forEach(d => {
    const todayCls = isToday(d) ? ' today' : '';
    const dowIdx = (d.getDay() + 6) % 7;
    let dayCls = '';
    if (dowIdx === 5) dayCls = ' sat';
    if (dowIdx === 6) dayCls = ' sun';
    html += `<th colspan="${SLOTS.length}" class="${dayCls}${todayCls}" style="border-bottom:none;font-size:0.8rem;">` +
      `${fmtShort(d)}（${DAY_NAMES[dowIdx]}）</th>`;
  });
  html += '</tr>';

  // Time slot header row
  html += '<tr>';
  pageDays.forEach(() => {
    SLOTS.forEach(slot => {
      // Show only hour marks to save space
      const label = slot.endsWith(':00') ? slot.replace(':00','') : '';
      html += `<th style="font-size:0.65rem;padding:2px;min-width:28px;">${label}</th>`;
    });
  });
  html += '</tr></thead><tbody>';

  // Member rows
  members.forEach((m, mi) => {
    html += `<tr><td class="time-cell">${esc(m.name)}</td>`;
    pageDays.forEach(d => {
      const dateStr = fmt(d);
      const key = dateStr + '_' + mi;
      const val = shifts[key] || '';
      SLOTS.forEach(slot => {
        const isOn = val.split(',').includes(slot);
        const cls = isOn ? 'slot on' : 'slot off';
        html += `<td class="${cls}" data-mi="${mi}" data-slot="${slot}" data-date="${dateStr}" onclick="toggleSlot(this)"></td>`;
      });
    });
    html += '</tr>';
  });
  html += '</tbody>';
  table.innerHTML = html;
}

async function toggleSlot(td) {
  const mi = parseInt(td.dataset.mi);
  const slot = td.dataset.slot;
  const dateStr = td.dataset.date;
  const key = dateStr + '_' + mi;
  let arr = (shifts[key] || '').split(',').filter(Boolean);

  if (arr.includes(slot)) {
    arr = arr.filter(s => s !== slot);
    td.className = 'slot off';
  } else {
    arr.push(slot);
    td.className = 'slot on';
  }
  arr.sort();

  const slotStr = arr.join(',');
  if (slotStr) { shifts[key] = slotStr; } else { delete shifts[key]; }
  await saveShift(dateStr, mi, slotStr || null);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== Member Management =====
function openMemberPanel() {
  renderMemberList();
  document.getElementById('memberPanel').classList.add('open');
  document.getElementById('feedbackBtn').style.display = 'none';
}
function closeMemberPanel() {
  document.getElementById('memberPanel').classList.remove('open');
  document.getElementById('feedbackBtn').style.display = '';
  if (currentDayDate) renderDayTable(); else renderWeek();
}
function renderMemberList() {
  document.getElementById('memberList').innerHTML = members.map((m, i) =>
    `<li><input type="text" value="${esc(m.name)}" onblur="renameMember(${i}, this.value)">
     <button onclick="removeMember(${i})">削除</button></li>`
  ).join('');
}
async function addMember() {
  if (members.length >= 10) { alert('メンバーは10人までです'); return; }
  const newM = await sbFetch('members', 'POST', {
    body: { name: '新メンバー', sort_order: members.length, passcode }
  });
  if (newM && newM.length > 0) members.push(newM[0]);
  renderMemberList();
  showSyncStatus();
}
async function removeMember(i) {
  if (!confirm(members[i].name + ' を削除しますか？')) return;
  await sbFetch('members', 'DELETE', { query: { id: `eq.${members[i].id}` } });
  await sbFetch('shifts', 'DELETE', { query: { member_index: `eq.${i}`, passcode: `eq.${passcode}` } });
  for (let j = i + 1; j < members.length; j++) {
    const old = await sbFetch('shifts', 'GET', { query: { member_index: `eq.${j}`, passcode: `eq.${passcode}` } });
    for (const s of (old || [])) {
      await sbFetch('shifts', 'DELETE', { query: { id: `eq.${s.id}` } });
      await sbFetch('shifts', 'POST', {
        body: { date: s.date, member_index: j - 1, shift_text: s.shift_text, passcode }
      });
    }
  }
  members.splice(i, 1);
  renderMemberList();
  showSyncStatus();
}
async function renameMember(i, name) {
  name = name.trim();
  if (!name) return;
  members[i].name = name;
  await sbFetch('members', 'PATCH', { query: { id: `eq.${members[i].id}` }, body: { name } });
  showSyncStatus();
}

// ===== Feedback =====
function openFeedback() {
  document.getElementById('feedbackPanel').classList.add('open');
  document.getElementById('feedbackText').value = '';
  document.getElementById('feedbackSent').style.display = 'none';
}
function closeFeedback() { document.getElementById('feedbackPanel').classList.remove('open'); }
async function sendFeedback() {
  const msg = document.getElementById('feedbackText').value.trim();
  if (!msg) return;
  await sbFetch('feedback', 'POST', { body: { passcode: passcode || 'anonymous', message: msg } });
  document.getElementById('feedbackText').value = '';
  document.getElementById('feedbackSent').style.display = 'block';
  setTimeout(() => closeFeedback(), 1500);
}

// ===== Init =====
(async function init() {
  if (passcode) {
    const data = await sbFetch('members', 'GET', { query: { passcode: `eq.${passcode}`, order: 'sort_order' } });
    if (data && data.length > 0) {
      members = data;
      showApp();
      await loadShifts();
      renderWeek();
      return;
    }
  }
  showLogin();
})();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
