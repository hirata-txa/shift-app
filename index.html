<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#4a6fa5">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>シフト表</title>
<style>
  :root {
    --primary: #4a6fa5;
    --primary-light: #e8eef6;
    --bg: #f5f6f8;
    --card: #ffffff;
    --border: #dee2e6;
    --text: #212529;
    --text-muted: #868e96;
    --danger: #e03131;
    --success: #2f9e44;
    --cell-h: 44px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.4;
    overscroll-behavior: none;
  }

  /* ===== Login Screen ===== */
  .login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .login-screen h1 { font-size: 1.5rem; color: var(--primary); margin-bottom: 8px; }
  .login-screen p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 24px; }
  .login-screen input {
    width: 200px;
    padding: 12px;
    font-size: 1.2rem;
    text-align: center;
    border: 2px solid var(--border);
    border-radius: 10px;
    letter-spacing: 8px;
    margin-bottom: 16px;
  }
  .login-screen input:focus { border-color: var(--primary); outline: none; }
  .login-screen .btn-primary {
    width: 200px;
    padding: 12px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    cursor: pointer;
    margin-bottom: 8px;
  }
  .login-screen .btn-secondary {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 0.85rem;
    cursor: pointer;
    text-decoration: underline;
  }
  .login-error { color: var(--danger); font-size: 0.85rem; margin-top: 8px; }

  /* ===== Header ===== */
  header {
    background: var(--primary);
    color: #fff;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-size: 1.1rem; font-weight: 600; }
  .header-buttons { display: flex; gap: 6px; }
  header button {
    background: rgba(255,255,255,0.2);
    border: none;
    color: #fff;
    font-size: 0.8rem;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
  }

  /* ===== Week Nav ===== */
  .week-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
  }
  .week-nav button {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.9rem;
    cursor: pointer;
    color: var(--text);
  }
  .week-nav span { font-size: 0.95rem; font-weight: 600; }

  /* ===== Shift Table ===== */
  .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0 0 80px;
  }
  table {
    width: 100%;
    min-width: 600px;
    border-collapse: collapse;
    background: var(--card);
  }
  th, td {
    border: 1px solid var(--border);
    text-align: center;
    font-size: 0.82rem;
    height: var(--cell-h);
    min-width: 70px;
  }
  th {
    background: var(--primary-light);
    color: var(--primary);
    font-weight: 600;
    position: sticky;
    top: 0;
    z-index: 10;
    padding: 6px 4px;
  }
  th.name-col {
    position: sticky;
    left: 0;
    z-index: 20;
    background: var(--primary);
    color: #fff;
    min-width: 80px;
  }
  td.name-cell {
    position: sticky;
    left: 0;
    z-index: 5;
    background: #f0f4f8;
    font-weight: 600;
    font-size: 0.85rem;
    white-space: nowrap;
  }
  .sun { color: var(--danger); }
  .sat { color: var(--primary); }

  /* ===== Shift Cell ===== */
  td.shift-cell { padding: 2px; cursor: pointer; transition: background 0.15s; }
  td.shift-cell:active { background: var(--primary-light); }
  td.shift-cell input {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
    text-align: center;
    font-size: 0.82rem;
    color: var(--text);
    outline: none;
    padding: 0;
  }
  td.shift-cell input:focus { background: #fff8e1; border-radius: 2px; }

  /* ===== Member Management ===== */
  .member-panel {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    justify-content: center;
    align-items: flex-end;
  }
  .member-panel.open { display: flex; }
  .member-sheet {
    background: var(--card);
    width: 100%;
    max-height: 70vh;
    border-radius: 16px 16px 0 0;
    padding: 20px 16px;
    overflow-y: auto;
  }
  .member-sheet h2 {
    font-size: 1rem;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .member-sheet h2 button {
    background: none;
    border: none;
    font-size: 1.3rem;
    cursor: pointer;
    color: var(--text-muted);
  }
  .member-list { list-style: none; }
  .member-list li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .member-list li input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px;
    font-size: 0.9rem;
  }
  .member-list li button {
    background: none;
    border: none;
    color: var(--danger);
    font-size: 0.85rem;
    margin-left: 8px;
    cursor: pointer;
    padding: 8px;
  }
  .add-member {
    margin-top: 12px;
    width: 100%;
    padding: 10px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    cursor: pointer;
  }

  /* ===== Syncing indicator ===== */
  .sync-status {
    position: fixed;
    bottom: 12px;
    right: 12px;
    background: var(--success);
    color: #fff;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 300;
  }
  .sync-status.show { opacity: 1; }

  th.today { background: #fff3bf; color: #e67700; }
  .app-screen { display: none; }
</style>
</head>
<body>

<!-- ===== Login Screen ===== -->
<div class="login-screen" id="loginScreen">
  <h1>シフト表</h1>
  <p>合言葉を入力してください</p>
  <input type="text" id="passcodeInput" maxlength="20" placeholder="合言葉" enterkeyhint="go">
  <button class="btn-primary" onclick="doLogin()">入る</button>
  <button class="btn-secondary" onclick="doCreate()">新しいグループを作る</button>
  <div class="login-error" id="loginError"></div>
</div>

<!-- ===== App Screen ===== -->
<div class="app-screen" id="appScreen">
  <header>
    <h1>シフト表</h1>
    <div class="header-buttons">
      <button onclick="openMemberPanel()">メンバー</button>
      <button onclick="doLogout()">退出</button>
    </div>
  </header>

  <div class="week-nav">
    <button onclick="changeWeek(-1)">&lt; 前週</button>
    <span id="weekLabel"></span>
    <button onclick="changeWeek(1)">翌週 &gt;</button>
  </div>

  <div class="table-wrap">
    <table id="shiftTable"></table>
  </div>
</div>

<!-- Member Panel -->
<div class="member-panel" id="memberPanel" onclick="if(event.target===this)closeMemberPanel()">
  <div class="member-sheet">
    <h2>メンバー管理 <button onclick="closeMemberPanel()">×</button></h2>
    <ul class="member-list" id="memberList"></ul>
    <button class="add-member" onclick="addMember()">+ メンバーを追加</button>
  </div>
</div>

<div class="sync-status" id="syncStatus">保存しました</div>

<script>
// ===== Supabase Config =====
const SUPABASE_URL = 'https://fatvcblikyqkfjifuxkh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_HUl7YjaWLIud2K_QeH6rPg_3NQu4lxV';

function sbFetch(table, method, params) {
  const url = new URL(`${SUPABASE_URL}/rest/v1/${table}`);
  const opts = {
    method: method || 'GET',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'resolution=merge-duplicates,return=representation' : 'return=representation'
    }
  };
  if (params?.query) {
    Object.entries(params.query).forEach(([k, v]) => url.searchParams.set(k, v));
  }
  if (params?.body) {
    opts.body = JSON.stringify(params.body);
  }
  return fetch(url, opts).then(r => r.json());
}

// ===== State =====
let passcode = localStorage.getItem('shift-passcode') || '';
let members = [];
let shifts = {};
let weekOffset = 0;

// ===== Login =====
function showLogin() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginError').textContent = '';
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
}

async function doLogin() {
  const code = document.getElementById('passcodeInput').value.trim();
  if (!code) return;
  passcode = code;
  const data = await sbFetch('members', 'GET', { query: { passcode: `eq.${passcode}`, order: 'sort_order' } });
  if (!data || data.length === 0) {
    document.getElementById('loginError').textContent = 'この合言葉のグループは見つかりません';
    return;
  }
  members = data;
  localStorage.setItem('shift-passcode', passcode);
  showApp();
  await loadShifts();
  render();
}

async function doCreate() {
  const code = document.getElementById('passcodeInput').value.trim();
  if (!code) {
    document.getElementById('loginError').textContent = '合言葉を入力してください';
    return;
  }
  // Check if already exists
  const existing = await sbFetch('members', 'GET', { query: { passcode: `eq.${code}`, limit: '1' } });
  if (existing && existing.length > 0) {
    document.getElementById('loginError').textContent = 'この合言葉は既に使われています';
    return;
  }
  passcode = code;
  // Create default members
  const defaults = ['メンバー1', 'メンバー2', 'メンバー3'];
  const body = defaults.map((name, i) => ({ name, sort_order: i, passcode }));
  members = await sbFetch('members', 'POST', { body });
  localStorage.setItem('shift-passcode', passcode);
  showApp();
  render();
}

function doLogout() {
  localStorage.removeItem('shift-passcode');
  passcode = '';
  members = [];
  shifts = {};
  showLogin();
}

// ===== Data Load/Save =====
async function loadShifts() {
  const data = await sbFetch('shifts', 'GET', { query: { passcode: `eq.${passcode}` } });
  shifts = {};
  if (data && Array.isArray(data)) {
    data.forEach(row => {
      shifts[row.date + '_' + row.member_index] = row.shift_text;
    });
  }
}

async function saveShift(date, memberIndex, text) {
  if (text) {
    await sbFetch('shifts', 'POST', {
      body: { date, member_index: memberIndex, shift_text: text, passcode },
      query: { on_conflict: 'date,member_index,passcode' }
    });
  } else {
    await sbFetch('shifts', 'DELETE', {
      query: {
        date: `eq.${date}`,
        member_index: `eq.${memberIndex}`,
        passcode: `eq.${passcode}`
      }
    });
  }
  showSyncStatus();
}

function showSyncStatus() {
  const el = document.getElementById('syncStatus');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

// ===== Date Helpers =====
function getMonday(offset) {
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const monday = new Date(d.setDate(diff));
  monday.setDate(monday.getDate() + offset * 7);
  monday.setHours(0,0,0,0);
  return monday;
}
function fmt(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmtShort(d) { return (d.getMonth()+1) + '/' + d.getDate(); }
const DAY_NAMES = ['月','火','水','木','金','土','日'];
function isToday(d) {
  const t = new Date();
  return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
}

// ===== Render =====
function render() {
  const monday = getMonday(weekOffset);
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(d.getDate() + i);
    days.push(d);
  }
  document.getElementById('weekLabel').textContent =
    `${monday.getFullYear()}年 ${fmtShort(monday)} 〜 ${fmtShort(days[6])}`;

  const table = document.getElementById('shiftTable');
  let html = '<thead><tr><th class="name-col">名前</th>';
  days.forEach((d, i) => {
    let cls = '';
    if (i === 5) cls = 'sat';
    if (i === 6) cls = 'sun';
    if (isToday(d)) cls += ' today';
    html += `<th class="${cls}">${fmtShort(d)}<br>${DAY_NAMES[i]}</th>`;
  });
  html += '</tr></thead><tbody>';

  members.forEach((m, mi) => {
    html += `<tr><td class="name-cell">${esc(m.name)}</td>`;
    days.forEach(d => {
      const key = fmt(d) + '_' + mi;
      const val = shifts[key] || '';
      html += `<td class="shift-cell"><input type="text" value="${esc(val)}"
        data-date="${fmt(d)}" data-mi="${mi}"
        onfocus="this.select()" onblur="onCellBlur(this)" enterkeyhint="done"></td>`;
    });
    html += '</tr>';
  });
  html += '</tbody>';
  table.innerHTML = html;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function onCellBlur(input) {
  const date = input.dataset.date;
  const mi = parseInt(input.dataset.mi);
  const val = input.value.trim();
  const key = date + '_' + mi;
  if (val) { shifts[key] = val; } else { delete shifts[key]; }
  saveShift(date, mi, val);
}

// ===== Week Navigation =====
async function changeWeek(dir) {
  weekOffset += dir;
  await loadShifts();
  render();
}

// ===== Member Management =====
function openMemberPanel() {
  renderMemberList();
  document.getElementById('memberPanel').classList.add('open');
}
function closeMemberPanel() {
  document.getElementById('memberPanel').classList.remove('open');
  render();
}
function renderMemberList() {
  const ul = document.getElementById('memberList');
  ul.innerHTML = members.map((m, i) =>
    `<li>
      <input type="text" value="${esc(m.name)}" onblur="renameMember(${i}, this.value)">
      <button onclick="removeMember(${i})">削除</button>
    </li>`
  ).join('');
}

async function addMember() {
  if (members.length >= 10) { alert('メンバーは10人までです'); return; }
  const newM = await sbFetch('members', 'POST', {
    body: { name: '新メンバー', sort_order: members.length, passcode }
  });
  if (newM && newM.length > 0) members.push(newM[0]);
  renderMemberList();
  showSyncStatus();
}

async function removeMember(i) {
  if (!confirm(members[i].name + ' を削除しますか？')) return;
  const id = members[i].id;
  await sbFetch('members', 'DELETE', { query: { id: `eq.${id}` } });
  // Delete shifts for this member
  await sbFetch('shifts', 'DELETE', {
    query: { member_index: `eq.${i}`, passcode: `eq.${passcode}` }
  });
  // Reindex shifts for members after deleted one
  for (let j = i + 1; j < members.length; j++) {
    const oldShifts = await sbFetch('shifts', 'GET', {
      query: { member_index: `eq.${j}`, passcode: `eq.${passcode}` }
    });
    for (const s of (oldShifts || [])) {
      await sbFetch('shifts', 'DELETE', { query: { id: `eq.${s.id}` } });
      await sbFetch('shifts', 'POST', {
        body: { date: s.date, member_index: j - 1, shift_text: s.shift_text, passcode }
      });
    }
  }
  members.splice(i, 1);
  renderMemberList();
  showSyncStatus();
}

async function renameMember(i, name) {
  name = name.trim();
  if (!name) return;
  members[i].name = name;
  await sbFetch('members', 'PATCH', {
    query: { id: `eq.${members[i].id}` },
    body: { name }
  });
  showSyncStatus();
}

// ===== Init =====
(async function init() {
  if (passcode) {
    const data = await sbFetch('members', 'GET', { query: { passcode: `eq.${passcode}`, order: 'sort_order' } });
    if (data && data.length > 0) {
      members = data;
      showApp();
      await loadShifts();
      render();
      return;
    }
  }
  showLogin();
})();

// PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
